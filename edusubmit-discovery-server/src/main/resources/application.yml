server:
  port: 8761

spring:
  application:
    name: edusubmit-discovery-server
  config:
    import : "configserver:"

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
